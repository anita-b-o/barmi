name: baseline

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend baseline validation
        working-directory: frontend
        run: npm run validate:baseline

      - name: Backend baseline validation
        working-directory: backend
        run: ./gradlew baselineCheck

  full-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend full validation
        run: ./scripts/validate-frontend-serial.sh

      - name: Backend full validation
        working-directory: backend
        run: ./gradlew baselineVerify

      - name: Backend docker build
        run: docker build -t barmi-backend:ci .

      - name: Compose production config
        run: docker compose --profile prod config

      - name: Compose staging config
        run: docker compose -f docker-compose.staging.yml config
