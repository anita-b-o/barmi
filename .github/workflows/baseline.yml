name: baseline

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend baseline validation
        working-directory: frontend
        run: npm run validate:baseline

      - name: Backend baseline validation
        working-directory: backend
        run: ./gradlew baselineCheck
