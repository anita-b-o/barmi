spring:
  application:
    name: barmi-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:barmi}
    username: ${DB_USER:barmi}
    password: ${DB_PASSWORD:barmi}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

app:
  security:
    jwtSecret: ${JWT_SECRET:change-me}
    jwtTtlMinutes: 60
  tenant:
    baseDomain: ${STORE_BASE_DOMAIN:example.com}
  mercadoPago:
    webhookSecret: ${MP_WEBHOOK_SECRET:change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info
