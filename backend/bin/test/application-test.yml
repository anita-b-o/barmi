spring:
  datasource:
    url: jdbc:h2:mem:barmi;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration-h2

app:
  security:
    jwtSecret: test-secret-please-change-32-bytes-minimum
