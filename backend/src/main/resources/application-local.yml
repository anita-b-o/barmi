spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:barmi}
    username: ${DB_USER:barmi}
    password: ${DB_PASSWORD:barmi123}

  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:barmi}
    user: ${DB_USER:barmi}
    password: ${DB_PASSWORD:barmi123}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: 8080

app:
  release:
    version: ${APP_VERSION:local-dev}
    commitSha: ${APP_COMMIT_SHA:local}
    buildTimestamp: ${APP_BUILD_TIMESTAMP:unknown}
  security:
    jwtSecret: ${JWT_SECRET:JWT_SIGNING_KEY=7f9c2ba4e88f827d616045507605853ed73b8094b9b2e0c3c5c7e5c7c4e1c9a1}
    jwtTtlMinutes: 60
    refreshTtlDays: 30
    allowDevIdentityHeader: true
    allowedOrigins: ${BACKEND_CORS_ALLOWED_ORIGINS:${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}}
  tenant:
    baseDomain: ${STORE_BASE_DOMAIN:example.com}
  notifications:
    email:
      mode: ${NOTIFICATION_EMAIL_MODE:logging}
      from: ${NOTIFICATION_EMAIL_FROM:}
  mercadoPago:
    webhookSecret: ${MP_WEBHOOK_SECRET:change-me}

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,outboxBacklog
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    redis:
      enabled: false
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
