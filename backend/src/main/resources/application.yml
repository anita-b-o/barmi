spring:
  application:
    name: barmi-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:barmi}
    username: ${DB_USER:barmi}
    password: ${DB_PASSWORD:barmi}
  data:
    redis:
      timeout: 500ms
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080
  forward-headers-strategy: framework

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [request:%X{requestId:-none}] %logger{36} - %msg%n"

app:
  release:
    version: ${APP_VERSION:0.1.0-dev}
    commitSha: ${APP_COMMIT_SHA:unknown}
  security:
    jwtSecret: ${JWT_SECRET:JWT_SIGNING_KEY=7f9c2ba4e88f827d616045507605853ed73b8094b9b2e0c3c5c7e5c7c4e1c9a1}
    jwtTtlMinutes: 60
    refreshTtlDays: 30
    allowDevIdentityHeader: ${ALLOW_DEV_IDENTITY_HEADER:false}
    allowedOrigins: ${BACKEND_CORS_ALLOWED_ORIGINS:${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}}
    refreshCookie:
      name: ${REFRESH_COOKIE_NAME:barmi_refresh_token}
      path: ${REFRESH_COOKIE_PATH:/api/auth}
      secure: ${REFRESH_COOKIE_SECURE:false}
      sameSite: ${REFRESH_COOKIE_SAMESITE:Lax}
      domain: ${REFRESH_COOKIE_DOMAIN:}
  money:
    defaultCurrency: ${DEFAULT_CURRENCY:UNSET}
  tenant:
    baseDomain: ${STORE_BASE_DOMAIN:example.com}
  notifications:
    storePublicScheme: ${STORE_PUBLIC_SCHEME:https}
    email:
      mode: ${NOTIFICATION_EMAIL_MODE:logging}
      from: ${NOTIFICATION_EMAIL_FROM:}
  mercadoPago:
    webhookSecret: ${MP_WEBHOOK_SECRET:change-me}
    timestampToleranceSeconds: ${MP_WEBHOOK_TIMESTAMP_TOLERANCE_SECONDS:300}
    replayGuard:
      enabled: ${MP_WEBHOOK_REPLAY_GUARD_ENABLED:true}
    replayGuardTtlMinutes: ${MP_WEBHOOK_REPLAY_GUARD_TTL_MINUTES:1440}
  rateLimit:
    enabled: ${RATE_LIMIT_ENABLED:true}

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,outboxBacklog
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
