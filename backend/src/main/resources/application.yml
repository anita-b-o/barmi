spring:
  application:
    name: barmi-backend
  servlet:
    multipart:
      max-file-size: ${HTTP_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${HTTP_MULTIPART_MAX_REQUEST_SIZE:10MB}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:barmi}
    username: ${DB_USER:barmi}
    password: ${DB_PASSWORD:barmi}
  data:
    redis:
      timeout: 500ms
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:none}
  max-http-request-header-size: ${HTTP_MAX_REQUEST_HEADER_SIZE:16KB}
  tomcat:
    max-http-form-post-size: ${HTTP_MAX_FORM_POST_SIZE:10MB}
    max-swallow-size: ${HTTP_MAX_SWALLOW_SIZE:10MB}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [request:%X{requestId:-none}] %logger{36} - %msg%n"

app:
  release:
    version: ${APP_VERSION:0.1.0-dev}
    commitSha: ${APP_COMMIT_SHA:unknown}
    buildTimestamp: ${APP_BUILD_TIMESTAMP:unknown}
  security:
    jwtSecret: ${JWT_SECRET:JWT_SIGNING_KEY=7f9c2ba4e88f827d616045507605853ed73b8094b9b2e0c3c5c7e5c7c4e1c9a1}
    jwtTtlMinutes: 60
    refreshTtlDays: 30
    allowDevIdentityHeader: ${ALLOW_DEV_IDENTITY_HEADER:false}
    allowedOrigins: ${BACKEND_CORS_ALLOWED_ORIGINS:${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}}
    refreshCookie:
      name: ${REFRESH_COOKIE_NAME:barmi_refresh_token}
      path: ${REFRESH_COOKIE_PATH:/api/auth}
      secure: ${REFRESH_COOKIE_SECURE:false}
      sameSite: ${REFRESH_COOKIE_SAMESITE:Lax}
      domain: ${REFRESH_COOKIE_DOMAIN:}
    refreshCleanup:
      initialDelay: ${REFRESH_CLEANUP_INITIAL_DELAY:PT5M}
      fixedDelay: ${REFRESH_CLEANUP_FIXED_DELAY:PT30M}
  money:
    defaultCurrency: ${DEFAULT_CURRENCY:UNSET}
  tenant:
    baseDomain: ${STORE_BASE_DOMAIN:example.com}
    trustProxyHeaders: ${TRUST_PROXY_HEADERS:false}
  notifications:
    storePublicScheme: ${STORE_PUBLIC_SCHEME:https}
    email:
      mode: ${NOTIFICATION_EMAIL_MODE:logging}
      from: ${NOTIFICATION_EMAIL_FROM:}
  mercadoPago:
    accessToken: ${MP_ACCESS_TOKEN:}
    apiBaseUrl: ${MP_API_BASE_URL:https://api.mercadopago.com}
    publicBaseUrl: ${MP_PUBLIC_BASE_URL:}
    stubEnabled: ${MP_STUB_ENABLED:false}
    webhookSecret: ${MP_WEBHOOK_SECRET:change-me}
    timestampToleranceSeconds: ${MP_WEBHOOK_TIMESTAMP_TOLERANCE_SECONDS:300}
    replayGuard:
      enabled: ${MP_WEBHOOK_REPLAY_GUARD_ENABLED:true}
    replayGuardTtlMinutes: ${MP_WEBHOOK_REPLAY_GUARD_TTL_MINUTES:1440}
  rateLimit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    maxCachedBodyBytes: ${RATE_LIMIT_MAX_CACHED_BODY_BYTES:262144}
  uploads:
    root: ${APP_UPLOADS_ROOT:uploads}
  observability:
    smoke:
      enabled: ${APP_OBSERVABILITY_SMOKE_ENABLED:false}
  seo:
    publicEcosystemSlug: ${PUBLIC_ECOSYSTEM_SLUG:demo-ecosystem}
    publicBaseUrl: ${PUBLIC_BASE_URL:}
  outbox:
    dispatcher:
      enabled: ${OUTBOX_DISPATCHER_ENABLED:true}
      batch-size: ${OUTBOX_DISPATCHER_BATCH_SIZE:50}
      max-attempts: ${OUTBOX_DISPATCHER_MAX_ATTEMPTS:10}
      lock-timeout: ${OUTBOX_DISPATCHER_LOCK_TIMEOUT:PT2M}
    retention:
      published-days: ${OUTBOX_RETENTION_PUBLISHED_DAYS:90}
      failed-days: ${OUTBOX_RETENTION_FAILED_DAYS:180}

observability:
  outbox:
    backlog-threshold: ${OUTBOX_BACKLOG_THRESHOLD:1000}
    oldest-pending-threshold: ${OUTBOX_OLDEST_PENDING_THRESHOLD:PT10M}
    failed-threshold: ${OUTBOX_FAILED_READINESS_THRESHOLD:0}

management:
  endpoint:
    health:
      show-details: never
      show-components: never
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,outboxBacklog
  endpoints:
    web:
      exposure:
        include: health
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
