global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: barmi-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api:8080
        labels:
          service: barmi-api
          environment: staging
