server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;

  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_next_upstream error timeout http_502 http_503 http_504;
  proxy_next_upstream_tries 2;
  proxy_connect_timeout 500ms;
  proxy_send_timeout 30s;
  proxy_read_timeout 30s;
  proxy_intercept_errors on;

  location @api_unavailable {
    default_type application/json;
    add_header Cache-Control "no-store" always;
    add_header Retry-After "3" always;
    return 503 '{"error":{"code":"backend_unavailable","message":"Backend temporarily unavailable","status":503}}';
  }

  # If you later use certbot webroot:
  # location /.well-known/acme-challenge/ {
  #   root /var/www/certbot;
  # }

  location = /actuator/health/liveness {
    set $api_upstream http://api:8080;
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    error_page 502 503 504 = @api_unavailable;
  }

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 308 https://$host:8443$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;

  ssl_certificate /etc/nginx/certs/staging.crt;
  ssl_certificate_key /etc/nginx/certs/staging.key;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_next_upstream error timeout http_502 http_503 http_504;
  proxy_next_upstream_tries 2;
  proxy_connect_timeout 500ms;
  proxy_send_timeout 30s;
  proxy_read_timeout 30s;
  proxy_intercept_errors on;

  location @api_unavailable {
    default_type application/json;
    add_header Cache-Control "no-store" always;
    add_header Retry-After "3" always;
    return 503 '{"error":{"code":"backend_unavailable","message":"Backend temporarily unavailable","status":503}}';
  }

  location /api/ {
    set $api_upstream http://api:8080;
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    error_page 502 503 504 = @api_unavailable;
  }

  location /actuator/ {
    set $api_upstream http://api:8080;
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    error_page 502 503 504 = @api_unavailable;
  }

  location / {
    set $web_upstream http://web:80;
    proxy_pass $web_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
